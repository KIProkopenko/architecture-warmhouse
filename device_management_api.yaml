openapi: 3.0.3
info:
  title: Device Management API
  description: API for managing smart home devices
  version: 1.0.0
servers:
  - url: http://device-mgmt-service:8080
    description: Device Management Service

paths:
  /devices:
    get:
      summary: Get list of devices for a user
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the user
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /devices/{id}:
    get:
      summary: Get device by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    put:
      summary: Update device status or metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceRequest'
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
        '401':
          description: Unauthorized
        '400':
          description: Invalid request body
        '500':
          description: Internal server error

  /devices/register:
    post:
      summary: Register a new device using a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Invalid token or request body
        '401':
          description: Unauthorized
        '409':
          description: Device already registered
        '500':
          description: Internal server error

components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type_id:
          type: string
          format: uuid
        house_id:
          type: string
          format: uuid
        serial_number:
          type: string
        status:
          type: string
          enum: [online, offline, error]
        last_seen:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - type_id
        - house_id
        - serial_number
        - status
        - last_seen

    RegisterDeviceRequest:
      type: object
      properties:
        token:
          type: string
        house_id:
          type: string
          format: uuid
      required:
        - token
        - house_id

    UpdateDeviceRequest:
      type: object
      properties:
        status:
          type: string
          enum: [online, offline, error]
        metadata:
          type: object
          additionalProperties: true
